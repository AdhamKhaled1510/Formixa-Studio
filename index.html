<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formixa Studio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Georgia', serif;
    color: white;
}

/* NAVBAR */
nav {
    position: absolute;
    top: 0;
    width: 100%;
    padding: 30px 60px;
    display: flex;
    justify-content: space-between;
    z-index: 10;
}

nav h1 {
    font-size: 22px;
    font-weight: 400;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: #ddd;
    font-size: 14px;
}

/* HERO SECTION */
.hero {
    height: 100vh;
    background: url("https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe") no-repeat center/cover;
    position: relative;
}

/* Overlay عشان اللون الغامق */
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
}

/* CONTENT */
.content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    padding: 20px;
}

.content h2 {
    font-size: 80px;
    line-height: 1.1;
    max-width: 900px;
}

.content p {
    margin-top: 20px;
    color: #ccc;
    font-size: 16px;
}

/* BUTTON */
.btn {
    margin-top: 40px;
    padding: 18px 45px;
    background: white;
    color: black;
    border-radius: 40px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #ddd;
}
</style>

</head>

<body>

<nav>
    <h1>Formixa Studio</h1>

    <div>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
</nav>

<section class="hero">
    <div class="content">
        <h2>Precision-Crafted 3D Designs</h2>
        <p>Expertly crafted 3D designs that elevate your professional image and open doors to success</p>
        <a href="#" class="btn">Learn More</a>
    </div>
</section>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Formixa Studio</title>
<link rel="stylesheet" href="style.css">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  emailjs.init("1nNEM5L6MOpCAsb0F");
</script>

<style>
/* ── CONTACT BODY ── */
.contact-body { padding: 6rem 4rem; background: linear-gradient(180deg, #050d1a 0%, #07090f 100%); }
.contact-body-inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.4fr; gap: 6rem; align-items: start; }

/* left info */
.contact-info { }
.contact-info h2 { font-family: var(--ff-display); font-size: clamp(1.5rem,2.5vw,2.1rem); font-weight: 700; letter-spacing: -0.025em; line-height: 1.15; margin-bottom: 1.2rem; }
.contact-info p { font-size: 0.95rem; color: var(--c-muted); line-height: 1.8; margin-bottom: 2.5rem; font-weight: 300; }

.contact-details { display: flex; flex-direction: column; gap: 1.2rem; margin-bottom: 3rem; }
.contact-detail {
  display: flex; align-items: flex-start; gap: 1rem;
  padding: 1.2rem; border: 1px solid var(--c-border); border-radius: 12px;
  background: rgba(255,255,255,0.02);
  transition: border-color 0.3s;
}
.contact-detail:hover { border-color: var(--c-border-hover); }
.detail-icon {
  width: 40px; height: 40px; border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(135deg,rgba(56,189,248,0.18),rgba(36,99,235,0.08));
  border: 1px solid rgba(56,189,248,0.18);
  display: flex; align-items: center; justify-content: center;
}
.detail-label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--c-accent); margin-bottom: 3px; }
.detail-val { font-size: 0.9rem; color: var(--c-text); font-weight: 400; }

.social-row { display: flex; gap: 0.75rem; }
.social-btn {
  width: 42px; height: 42px; border-radius: 10px;
  border: 1px solid var(--c-border); background: rgba(255,255,255,0.02);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
  text-decoration: none;
}
.social-btn:hover { border-color: var(--c-border-hover); background: rgba(56,189,248,0.08); }

/* form */
.contact-form-wrap { }
.contact-form-wrap h3 { font-family: var(--ff-display); font-size: 1.1rem; font-weight: 600; margin-bottom: 1.8rem; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.2rem; }
label { font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--c-muted); }

input[type="text"], input[type="email"], select, textarea {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--c-border);
  border-radius: 10px;
  color: var(--c-text);
  font-family: var(--ff-body);
  font-size: 0.92rem;
  padding: 0.8rem 1rem;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  width: 100%;
}

input[type="text"]:focus,
input[type="email"]:focus,
select:focus,
textarea:focus {
  border-color: rgba(56,189,248,0.5);
  background: rgba(56,189,248,0.05);
}

textarea {
  min-height: 140px;
  resize: vertical;
}

/* success */
.form-success {
  display: none;
  text-align: center;
  padding: 3rem 2rem;
  border: 1px solid rgba(56,189,248,0.3);
  border-radius: var(--radius);
  background: rgba(56,189,248,0.05);
}

@media (max-width: 900px) {
  .contact-body { padding: 5rem 2rem; }
  .contact-body-inner { grid-template-columns: 1fr; gap: 4rem; }
}
</style>
</head>

<body>

<nav>
  <a href="index.html" class="logo">Formixa<em>.</em>Studio</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="contact.html" class="nav-cta active">Contact</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1>Let's Talk About Your Next Project</h1>
</div>

<section class="contact-body">
  <div class="contact-body-inner">

    <!-- LEFT -->
    <div class="contact-info">
      <h2>We'd Love to Hear From You</h2>
      <p>Contact us anytime.</p>
    </div>

    <!-- FORM -->
    <div class="contact-form-wrap">
      <h3>Send Us a Message</h3>

      <form id="contactForm">
        <div class="form-row">
          <div class="form-group">
            <label>First name</label>
            <input type="text" id="fname" required>
          </div>

          <div class="form-group">
            <label>Last name</label>
            <input type="text" id="lname" required>
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>

        <div class="form-group">
          <label>Service</label>
          <select id="service"></select>
        </div>

        <div class="form-group">
          <label>Budget</label>
          <select id="budget"></select>
        </div>

        <div class="form-group">
          <label>Message</label>
          <textarea id="message"></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>

      <div class="form-success" id="formSuccess">
        <h3>Message Sent!</h3>
      </div>
    </div>

  </div>
</section>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const params = {
    fname: document.getElementById('fname').value,
    lname: document.getElementById('lname').value,
    email: document.getElementById('email').value,
    service: document.getElementById('service').value,
    budget: document.getElementById('budget').value,
    message: document.getElementById('message').value,
    time: new Date().toLocaleString()
  };

  emailjs.send(
    "service_p1s5tdf",
    "template_i98w9nj",
    params
  )
  .then(() => {
    document.getElementById('contactForm').style.display = "none";
    document.getElementById('formSuccess').style.display = "block";
  })
  .catch((err) => {
    console.log(err);
    alert("Failed to send");
  });

});
</script>

</body>
</html>

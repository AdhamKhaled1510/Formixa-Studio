<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Formixa Studio</title>

<link rel="stylesheet" href="style.css">

<!-- ================= EMAILJS ================= -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
  emailjs.init("1nNEM5L6MOpCAsb0F");
</script>

<style>
/* ── CONTACT BODY ── */
.contact-body { padding: 6rem 4rem; background: linear-gradient(180deg, #050d1a 0%, #07090f 100%); }
.contact-body-inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.4fr; gap: 6rem; align-items: start; }

.form-success {
  display:none;
  text-align:center;
  padding:2rem;
  border:1px solid #38bdf8;
  border-radius:10px;
  color:#fff;
}
</style>

</head>

<body>

<nav>
  <a href="index.html" class="logo">Formixa<em>.</em>Studio</a>
</nav>

<!-- ================= HEADER ================= -->
<div class="page-header">
  <h1>Contact Us</h1>
</div>

<!-- ================= FORM SECTION ================= -->
<section class="contact-body">

  <div class="contact-body-inner">

    <!-- FORM -->
    <div>
      <form id="contactForm">

        <input type="text" id="fname" placeholder="First name" required><br><br>
        <input type="text" id="lname" placeholder="Last name" required><br><br>

        <input type="email" id="email" placeholder="Email" required><br><br>

        <select id="service">
          <option>3D Modeling</option>
          <option>Rendering</option>
          <option>Design</option>
        </select><br><br>

        <select id="budget">
          <option>$80</option>
          <option>$150+</option>
        </select><br><br>

        <textarea id="message" placeholder="Your message"></textarea><br><br>

        <button type="submit" id="sendBtn">Send Message</button>

      </form>

      <!-- SUCCESS -->
      <div id="formSuccess" class="form-success">
        <h2>✅ Message Sent Successfully</h2>
        <p>We will contact you soon.</p>
      </div>

    </div>

  </div>
</section>

<!-- ================= SCRIPT ================= -->
<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const form = document.getElementById('contactForm');
  const success = document.getElementById('formSuccess');

  const params = {
    fname: document.getElementById('fname').value,
    lname: document.getElementById('lname').value,
    email: document.getElementById('email').value,
    service: document.getElementById('service').value,
    budget: document.getElementById('budget').value,
    message: document.getElementById('message').value,
    time: new Date().toLocaleString()
  };

  try {
    await emailjs.send(
      "service_p1s5tdf",
      "template_i98w9nj",
      params
    );

    form.style.display = "none";
    success.style.display = "block";

  } catch (error) {
    alert("Error sending message");
    console.log(error);
  }
});
</script>

</body>
</html>
